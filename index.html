<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./daniel.css">
    <title>Controle Financeiro</title>
</head>
<body>
     
    <div class="container">

        <h1>Controle Financeiro</h1>

        <div class="box">
            <h3>Adicionar Saldo Inicial</h3>
            <input type="number" placeholder="Digite o saldo inicial">
            <button>Salvar Saldo</button>
        </div>

        <h2>Saldo Atual: R$ 0,00</h2>

        <div class="box">
            <h3>Nova Transação</h3>
            <input type="text" placeholder="Descrição">
            <input type="number" placeholder="Valor">
            <button>Adicionar</button>
        </div>

        <div class="box">
            <h3>Histórico</h3>
            <ul>
                <li>Salário + R$ 1000</li>
                <li>Aluguel - R$ 500</li>
            </ul>
        </div>

    </div>

</body>
</html>
